# Copy to .streamlit/secrets.toml for local development.
# Set the same flat keys in Streamlit Cloud → app settings → Secrets.
# All keys below are required unless noted.

SUPABASE_URL = "https://your-project.supabase.co"
SUPABASE_ANON_KEY = "your-anon-or-publishable-key"
# Must be service_role / sb_secret_ (NOT anon / publishable)
SUPABASE_SERVICE_ROLE_KEY = "your-service-role-or-sb_secret-key"

# Compatible aliases used by this project on Streamlit Cloud:
# SUPABASE_STOCK_URL = "https://your-project.supabase.co"
# SUPABASE_STOCK_ANON_KEY = "sb_publishable_..."
# SUPABASE_STOCK_SECRET_KEY = "sb_secret_..."

JWT_SECRET_KEY = "generate-a-long-random-secret"

ADMIN_USERNAME = "admin_username"
ADMIN_PASSWORD = "strong-admin-password"
ADMIN_EMAIL = "admin@example.com"

STRIPE_SECRET_KEY = "sk_live_or_test_..."
STRIPE_PRICE_MONTHLY = "price_..."
STRIPE_PRICE_YEARLY = "price_..."

# Optional: public app URL used for mobile install manifest and password-reset email links
# APP_BASE_URL = "https://techlife-app.streamlit.app"

# --- Gmail SMTP (forgot-password emails) ---
# Use a Google Account App Password (2FA required), NOT the normal login password.
# Google shows it as 4 groups with spaces; paste with or without spaces.
SMTP_HOST = "smtp.gmail.com"
SMTP_PORT = "587"
SMTP_USER = "Techlife2027@gmail.com"
SMTP_PASSWORD = "your-gmail-app-password"
SMTP_FROM = "Techlife2027@gmail.com"
SMTP_USE_TLS = "1"

# Optional: auto-translate enterprise KB on import/add (zh <-> en)
# DEEPSEEK_API_KEY = "sk-..."
# DEEPSEEK_BASE_URL = "https://api.deepseek.com"
# DEEPSEEK_MODEL = "deepseek-chat"
